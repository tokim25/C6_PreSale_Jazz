<script type="text/template" id="mainview-template">

    <div id="match-050-view" style="background-color: <%=bg_info.backgroundColor%>;">
        <div class="<%=bg_info.backgroundClass%>"></div>

        <div><h1 class="module-title"><%= name %></h1></div>

        <div class="match-050-targets target-container">
            <h1 class="match-050-music-title"><%= text.targetTitle %></h1>
            <% _.each(items, function (item, index) { %>
            <div class="match-050-target drag-target" data-id="<%= item.id %>">
                <div class="content">
                    <h1 class="match-050-label">-- ? --</h1>
                    <p class="match-050-description"><%= item.description %></p>
                </div>
                <div class="match-050-undo-button undo-button">undo</div>
            </div>
            <% }); %>
            <div class="match-050-targets-bg"></div>
        </div>

        <div class="match-050-items drag-container">
            <% if(randomize) { items = _.shuffle(items); } %>
            <% _.each(items, function (item, index) { %>
            <div class="match-050-item drag-item" data-id="<%= item.id %>">
                <div class="match-050-item-img" data-id="<%= item.id %>"></div>
                <h1 class="match-050-label"><%= item.title %></h1>
            </div>
            <% }); %>
        </div>



        <div class="main-button submit-button">Check Answers</div>

        <div class="scrim-background"></div>

        <div class="popup-container"></div>

        <div class="splash-container"></div>
        <div class="conclusion-container"></div>


    </div>


</script>
