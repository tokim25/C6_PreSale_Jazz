<script type="text/template" id="quiz-wf-mainview-template">

    <div id="quizwf-view" style="background-color:<%= backgroundColor %>;">
        <div class="bg-texture-bottom"></div><div class="bg-texture-middle"></div><div class="bg-texture-top"></div>

        <h1 class="module-title"><%= name %></h1>

        <div class="quizwf-game-container">
            <div class="quizwf-guitar"></div>
            <div class="quizwf-amp"></div>
            <% _.each(lines, function (line, index) { %>
                <%= line %>
             <% }); %>
            <% _.each(questions, function (question, index) { %>
                <div class="quizwf-ghostpedal" id="quizwf-ghostpedal<%= index %>" data-id="<%= index %>"></div>
                <div class="quizwf-pedal" id="quizwf-pedal<%= index %>" data-id="<%= index %>"></div>
            <% }); %>
        </div>

        <div class="quizwf-qa-container">

            <div class="quizwf-question-box">
                <div class="quizwf-q">q:</div>
                <h2 class="content"></h2>
            </div>

            <div class="quizwf-roles-box">
                <div class="content"></div>
            </div>

            <div class="quizwf-answer-box ">

                <div class="content"></div>
            </div>

            <div class="quizwf-answer-choice sketch-box-solid enabled proto">
                <div class="top"></div><div class="right"></div><div class="bottom"></div><div class="left"></div><div class="center"></div>
                <div class="content"></div>
            </div>

        </div>

        <div class="scrim-background"></div>

        <div class="quizwf-feedback-box popup-container"></div>


        <div class="splash-container"></div>

        <div class="conclusion-container"></div>


    </div>


</script>
