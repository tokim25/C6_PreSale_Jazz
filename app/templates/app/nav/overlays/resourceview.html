<script type="text/template" id="resourceview-template">


    <div id="resources-view">
        <div class="overlay-title"><div class="resources-ititle title-icon"></div>Resources</div>
        <div class="resource-container">
            <div class="resource-list">
                <%  _.each(filteredGroups, function (group) { %>
                <div class="resource-group">
                <h1><%= group.label %></h1>

                    <%  _.each(group.links, function (link) { %>
                    <p><a target="_blank" href="<%= link.url %>"><%= link.text %></a></p>
                    <%  }); %>

                </div>
                <%  }); %>
            </div>
        </div>
    </div>
    <div class="close-ibutton enabled" data-id="close"></div>

</script>
